<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taped Paper</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --pink: #ecb2ba;
        --pink-dark: #c6939a;
        --tape-gray: #dbd8be;
        --tape-edge-gray: #b7b49d;
        --transparent: rgba(255, 255, 255, 0);
      }

      body {
        background: #ebf4e9;
        padding: 20px;
        display: flex;
        justify-content: center;
        flex-direction: column;
      }

      .pink {
        --paper-color: var(--pink);
        --paper-dark: var(--pink-dark);
        --shadow-size: 1px;
        --transparent: rgba(236, 178, 186, 0);
      }

      .paper {
        position: relative;
        background: linear-gradient(
            to bottom right,
            var(--paper-dark),
            20%,
            var(--transparent)
          ),
          var(--paper-color);
        min-width: 250px;
        max-width: 320px;
        min-height: 130px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 28px 32px;
        font-family: "Caveat", cursive;
        font-size: 2rem;
        line-height: 1.15;
        box-shadow: var(--shadow-size) var(--shadow-size) 2px var(--paper-dark);
        margin: auto;
        margin-top: 50px;
      }

      .paper p {
        margin: 0;
      }

      .paper::after {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(
            var(--transparent),
            50%,
            var(--paper-dark),
            51%,
            var(--transparent)
          ),
          linear-gradient(
            to right,
            var(--transparent),
            50%,
            var(--paper-dark),
            51%,
            var(--transparent)
          );
        pointer-events: none;
      }

      .tape-section {
        position: absolute;
        width: 100%;
        left: 0;
      }

      .tape-section:first-of-type {
        top: 0;
      }

      .tape-section:last-of-type {
        bottom: 0;
      }

      .tape-section::before,
      .tape-section::after {
        content: "";
        width: 10vmin;
        height: 4vmin;
        position: absolute;
        background-color: var(--tape-gray);
        opacity: 0.5;
        border-right: 1px dotted var(--tape-edge-gray);
        border-left: 1px dotted var(--tape-edge-gray);
      }

      .tape-section:last-of-type::after {
        transform: rotate(-45deg);
        right: -4vmin;
        top: -3vmin;
      }

      .tape-section:first-of-type::before {
        transform: rotate(-45deg);
        left: -4vmin;
      }

      .tape-section:first-of-type::after {
        transform: rotate(45deg);
        right: -4vmin;
        top: 0;
      }

      .tape-section:last-of-type::before {
        transform: rotate(45deg);
        left: -4vmin;
        bottom: 0;
      }
    </style>
  </head>
  <body>
    <div class="paper pink">
      <div class="tape-section"></div>
      <p>sticky notes and hover to lift the corner and click to peel off the wall</p>
      <div class="tape-section"></div>
    </div>
  </body>
</html>
